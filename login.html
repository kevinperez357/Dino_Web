<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Base de Datos de Dinosaurios</title>
    <link rel="stylesheet" href="pagina_style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-register {
            background: #f0f0f0;
            color: #333;
        }

        .btn-register:hover {
            background: #e0e0e0;
        }

        .status-message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .status-message.error {
            display: block;
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .status-message.success {
            display: block;
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .status-message.info {
            display: block;
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }

        .register-form {
            display: none;
        }

        .register-form.show {
            display: block;
        }

        .login-form.hide {
            display: none;
        }

        .toggle-form {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .toggle-form button {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
            text-decoration: underline;
        }

        .toggle-form button:hover {
            color: #764ba2;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🦕 Dinosaurios</h1>
            
            <!-- Mensaje de estado -->
            <div id="statusMessage" class="status-message"></div>

            <!-- Formulario de Login -->
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-login" id="loginBtn">Iniciar Sesión</button>
                </div>

                <div class="toggle-form">
                    ¿No tienes cuenta? 
                    <button type="button" onclick="toggleForms()">Regístrate</button>
                </div>
            </form>

            <!-- Formulario de Registro -->
            <form class="register-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerName">Nombre Completo</label>
                    <input type="text" id="registerName" required placeholder="Tu nombre">
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="registerPassword">Contraseña</label>
                    <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
                </div>

                <div class="form-group">
                    <label for="registerPasswordConfirm">Confirmar Contraseña</label>
                    <input type="password" id="registerPasswordConfirm" required placeholder="Repite tu contraseña">
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-login" id="registerBtn">Registrarse</button>
                </div>

                <div class="toggle-form">
                    ¿Ya tienes cuenta? 
                    <button type="button" onclick="toggleForms()">Inicia Sesión</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Alternar entre formularios
        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hide');
            document.getElementById('registerForm').classList.toggle('show');
            document.getElementById('statusMessage').textContent = '';
            document.getElementById('statusMessage').className = 'status-message';
        }

        // Mostrar mensaje
        function showMessage(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
        }

        // Manejar Login
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');

            try {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span>Iniciando...';

                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.error || 'Error en el login', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Iniciar Sesión';
                    return;
                }

                // Guardar datos de sesión
                localStorage.setItem('usuario', JSON.stringify({
                    usuario_id: data.usuario_id,
                    email: data.email,
                    nombre: data.nombre
                }));

                showMessage('¡Login exitoso! Redirigiendo...', 'success');

                // Redirigir a la página principal después de 1 segundo
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Error:', error);
                showMessage('Error de conexión: ' + error.message, 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Iniciar Sesión';
            }
        }

        // Manejar Registro
        async function handleRegister(event) {
            event.preventDefault();

            const nombre = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            const registerBtn = document.getElementById('registerBtn');

            // Validaciones
            if (password !== passwordConfirm) {
                showMessage('Las contraseñas no coinciden', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            try {
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<span class="spinner"></span>Registrando...';

                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password, nombre })
                });

                const data = await response.json();

                if (!response.ok) {
                    showMessage(data.error || 'Error en el registro', 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Registrarse';
                    return;
                }

                showMessage('¡Registro exitoso! Iniciando sesión automáticamente...', 'success');

                // Guardar datos y redirigir
                localStorage.setItem('usuario', JSON.stringify({
                    usuario_id: data.usuario_id,
                    email: data.email,
                    nombre: data.nombre
                }));

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Error:', error);
                showMessage('Error de conexión: ' + error.message, 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Registrarse';
            }
        }

        // Verificar si ya está autenticado
        window.addEventListener('load', () => {
            const usuario = localStorage.getItem('usuario');
            if (usuario) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
